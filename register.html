<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>春日部アカデミー LINE通知登録</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #f5f7fa;
    color: #2c3e50;
    line-height: 1.6;
    min-height: 100vh;
    padding: 20px 16px;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    padding: 24px 0;
  }
  .academy-name {
    font-size: 14px;
    color: #7f8c8d;
    margin-bottom: 4px;
  }
  .page-title {
    font-size: 20px;
    font-weight: 600;
    color: #2c3e50;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 24px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    margin-bottom: 16px;
  }
  .loading {
    text-align: center;
    padding: 40px 20px;
    color: #7f8c8d;
  }
  .error {
    color: #c0392b;
    background: #fef0ef;
    padding: 16px;
    border-radius: 8px;
    text-align: center;
  }
  .family-confirm {
    text-align: center;
  }
  .family-label {
    font-size: 13px;
    color: #7f8c8d;
    margin-bottom: 8px;
  }
  .family-name {
    font-size: 28px;
    font-weight: 600;
    color: #2c3e50;
    margin-bottom: 16px;
  }
  .student-section {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 16px;
    margin: 16px 0;
  }
  .student-section-label {
    font-size: 12px;
    color: #7f8c8d;
    margin-bottom: 8px;
  }
  .student-item {
    font-size: 15px;
    color: #2c3e50;
    margin: 4px 0;
  }
  .btn-primary {
    display: block;
    width: 100%;
    background: #00b900;
    color: white;
    padding: 16px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
  }
  .btn-primary:hover {
    background: #009900;
  }
  .btn-primary:disabled {
    background: #bdc3c7;
    cursor: not-allowed;
  }
  .notice {
    font-size: 12px;
    color: #7f8c8d;
    text-align: center;
    margin-top: 16px;
    padding: 0 8px;
  }
  .completed {
    text-align: center;
    padding: 24px;
  }
  .completed-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .completed-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #2c3e50;
  }
  .completed-message {
    font-size: 14px;
    color: #555;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <p class="academy-name">春日部アカデミー</p>
      <h1 class="page-title">引き落とし通知 LINE登録</h1>
    </div>
    
    <div class="card" id="content">
      <div class="loading">読み込み中...</div>
    </div>
  </div>

<script>
  // GASのウェブアプリURL（後で更新する）
  const GAS_URL = 'PLACEHOLDER_GAS_URL';
  
  // URLからトークンを取り出す
  function getToken() {
    const params = new URLSearchParams(window.location.search);
    return params.get('t');
  }
  
  // 起動時の処理
  window.addEventListener('load', function() {
    const token = getToken();
    
    if (!token) {
      showError('登録URLが正しくありません。<br>福地先生にお問い合わせください。');
      return;
    }
    
    // トークンを検証して家族情報を取得
    verifyToken(token);
  });
  
  function verifyToken(token) {
    // GAS側のverifyToken APIを呼び出す
    // 注意：このURLはまだプレースホルダ。Step 4で実装。
    
    // 暫定的に「実装中」表示
    showImplementationNotice(token);
  }
  
  function showImplementationNotice(token) {
    const content = document.getElementById('content');
    content.innerHTML = `
      <div class="family-confirm">
        <p class="family-label">トークン確認</p>
        <p class="family-name" style="font-size: 18px; word-break: break-all;">${token}</p>
        <div class="student-section">
          <p style="font-size: 14px; color: #7f8c8d;">
            このページは現在実装中です。<br>
            Step 4 で完成します。
          </p>
        </div>
        <button class="btn-primary" disabled>LINEで登録する（実装中）</button>
        <p class="notice">
          ※トークンが正しく取得できていることを確認しました
        </p>
      </div>
    `;
  }
  
  function showError(message) {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="error">' + message + '</div>';
  }
</script>
</body>
</html>
