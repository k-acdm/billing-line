<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>春日部アカデミー LINE通知登録</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: linear-gradient(135deg, #fff7ed, #fef3c7);
    color: #2c3e50;
    line-height: 1.6;
    min-height: 100vh;
    padding: 20px 16px;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    padding: 24px 0;
  }
  .academy-name {
    font-size: 14px;
    color: #7f8c8d;
    margin-bottom: 4px;
  }
  .page-title {
    font-size: 20px;
    font-weight: 600;
    color: #2c3e50;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 28px 22px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.10);
    margin-bottom: 16px;
  }
  .loading {
    text-align: center;
    padding: 40px 20px;
    color: #7f8c8d;
  }
  .error {
    color: #b91c1c;
    background: #fee2e2;
    border: 1.5px solid #f87171;
    padding: 16px;
    border-radius: 10px;
    text-align: center;
    line-height: 1.7;
  }
  .family-confirm {
    text-align: center;
  }
  .family-label {
    font-size: 13px;
    color: #7f8c8d;
    margin-bottom: 8px;
  }
  .family-name {
    font-size: 28px;
    font-weight: 600;
    color: #2c3e50;
    margin-bottom: 16px;
  }
  .student-section {
    background: #f8f9fa;
    border-radius: 10px;
    padding: 16px;
    margin: 20px 0;
    text-align: left;
  }
  .student-section-label {
    font-size: 12px;
    color: #7f8c8d;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .student-item {
    font-size: 15px;
    color: #2c3e50;
    margin: 6px 0;
    padding-left: 8px;
  }
  .btn-primary {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, #06c755, #04a64b);
    color: white;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    text-decoration: none;
    box-shadow: 0 4px 12px rgba(6,199,85,.3);
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #04a64b, #038c3f);
  }
  .notice {
    font-size: 12px;
    color: #888;
    text-align: center;
    margin-top: 16px;
    padding: 0 8px;
    line-height: 1.7;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <p class="academy-name">春日部アカデミー</p>
      <h1 class="page-title">引き落とし通知 LINE登録</h1>
    </div>
    
    <div class="card" id="content">
      <div class="loading">読み込み中...</div>
    </div>
  </div>

<script>
  // billing-lineのGAS WebアプリURL
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyWqIdWCDoj9QY0FDtX5YaiuhSKyf57NyEpmranwzOhAww73bk4VDs6RF2IukFpDw7k/exec';
  
  // URLからトークンを取り出す
  function getToken() {
    const params = new URLSearchParams(window.location.search);
    return params.get('t');
  }
  
  // 起動時の処理
  window.addEventListener('load', function() {
    const token = getToken();
    
    if (!token) {
      showError('登録URLが正しくありません。<br>福地までお問い合わせください。');
      return;
    }
    
    // LINE Login ボタンを表示
    showLoginButton(token);
  });
  
  function showLoginButton(token) {
    const content = document.getElementById('content');
    // GASに?action=lineLoginStart&token=XXX で遷移するURL
    const loginUrl = GAS_URL + '?action=lineLoginStart&token=' + encodeURIComponent(token);
    
    content.innerHTML = `
      <div class="family-confirm">
        <p style="font-size: 15px; color: #2c3e50; margin-bottom: 20px; line-height: 1.8;">
          下のボタンを押すと、<br>
          LINEで認証が始まります。
        </p>
        <a href="${loginUrl}" class="btn-primary">
          LINEで登録する
        </a>
        <p class="notice">
          ※ 認証画面でLINEアカウントを選択し、<br>
          「許可する」をタップしてください。
        </p>
      </div>
    `;
  }
  
  function showError(message) {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="error">' + message + '</div>';
  }
</script>
</body>
</html>
